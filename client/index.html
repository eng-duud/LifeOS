    <!-- Open Graph / Social -->
    <meta property="og:title" content="Life OS — نظام تشغيل الحياة" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Life OS — نظام تشغيل الحياة" />
    <meta name="twitter:description" content="نظام متكامل لإدارة الحياة: المهام، المشاريع، الأهداف، العادات، والإحصائيات" />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- DNS Prefetch / Preconnect -->
    <link rel="dns-prefetch" href="/" />
    <link rel="preconnect" href="/" />

    <!-- Preload Critical Assets -->
    <link rel="preload" href="/icon-192.png" as="image" />
    <link rel="preload" href="/icon-512.png" as="image" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', {
            scope: '/',
          }).then((registration) => {
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available
                  console.log('🔄 Life OS: تحديث جديد متاح');
                }
              });
            });
          }).catch((err) => {
            console.warn('Life OS: ServiceWorker registration failed:', err);
          });
        });

        // Detect controller change (new SW activated)
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }

      // PWA install prompt
      let deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Dispatch custom event for the UI to show install button
        window.dispatchEvent(new CustomEvent('pwa-install-ready', { detail: e }));
      });

      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        console.log('✅ Life OS: تم تثبيت التطبيق');
        window.dispatchEvent(new CustomEvent('pwa-installed'));
      });
    </script>

  </body>

</html>
